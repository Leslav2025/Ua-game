<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OUN Tank: Battle for UA</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #0a0a0a; color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; touch-action: manipulation; overflow-y: auto; min-height: 100vh; }
        #ton-connect-button { margin-bottom: 10px; }
        .ui-panel { background: rgba(30, 0, 0, 0.9); border: 2px solid #ff0000; border-radius: 15px; padding: 10px; margin-bottom: 10px; text-align: center; width: 90%; box-shadow: 0 0 15px #ff0000; }
        .stats-row { display: flex; justify-content: space-around; align-items: center; }

        .ammo-box { font-size: 20px; font-weight: bold; color: #ff4757; }
        canvas { border: 3px solid #333; border-radius: 12px; background: #111; max-width: 95vw; }
        
        /* НОВЕ КЕРУВАННЯ (ХРЕСТИК) */
        .controls { display: grid; grid-template-columns: repeat(3, 70px); grid-template-rows: repeat(3, 70px); gap: 10px; margin-top: 20px; justify-content: center; }
        .btn { width: 70px; height: 70px; background: #222; border: 2px solid #ff0000; border-radius: 15px; font-size: 30px; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; user-select: none; }
        .btn:active { background: #ff0000; color: #000; }
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-fire { background: #ff4757; border-color: #fff; grid-column: 2; grid-row: 2; font-size: 35px; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }
